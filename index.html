<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Restore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Git Restore</h1>

        <p>
            Git Restore is used to restore files in the working directory
            and discard unwanted changes.
        </p>

        <div class="card">
            <h2>Command</h2>
            <code>git restore filename</code>
        </div>

        <div class="card">
            <h2>Example</h2>
            <code>git restore index.html</code>
        </div>

        <div class="card">
            <h2>Use Case</h2>
            <p>
                Revert a file back to its last committed state.
            </p>
        </div>
    </div>
</body>
</html>
